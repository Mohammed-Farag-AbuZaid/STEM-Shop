name: stem_shop
description: "A new Flutter project."

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.0

#------------------- PACKAGES -------------------#
dependencies:
  flutter:
    sdk: flutter

  # Icons
  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.3.0
  font_awesome_flutter: ^11.0.0
  fluttericon: ^2.0.0
  flutter_native_splash: ^2.3.2

  # State Management & Storage
  get: ^4.6.1
  get_storage: ^2.1.1 

  # Date & Time
  jiffy: ^6.4.5
  intl: ^0.20.2

  # Networking
  http: ^1.6.0

  # Images & Pickers
  cached_network_image: ^3.2.0
  image_picker: ^1.2.2
  image_pickers: ^2.0.0+2

  # Animation
  show_up_animation: ^2.0.0
  auto_animated: ^3.0.1

  # Google Maps & Location
  flutter_polyline_points: ^3.1.0
  google_maps_flutter: ^2.1.5
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Firebase & Notifications
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter_local_notifications: ^22.0.0
  cloud_firestore: ^6.5.0

  # Local Data Cache
  sqflite: ^2.0.2
  shared_preferences: ^2.0.15
  path: ^1.8.0

  # QR Code & Others
  qr_flutter: ^4.0.0
  mobile_scanner: ^7.1.1

  # UI Components & Layout
  grouped_list: ^6.0.0
  url_launcher: ^6.1.2
  dropdown_search: ^7.0.0
  badges: ^3.2.0
  responsive_builder: ^0.7.1
  device_preview: ^1.3.1

  # Functional Programming
  dartz: ^0.10.1

  # Authentication
  google_sign_in: ^7.2.0
  logger: ^2.7.0
  smooth_page_indicator: ^2.0.1
  js: ^0.7.2
  carousel_slider: ^5.1.2
  readmore_flutter: ^1.1.3
  readmore: ^3.0.0
  firebase_auth: ^6.5.2
#------------------ PACKAGES END ------------------#

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

#------------------ FLUTTER CONFIG ------------------#
flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/logos/
    - assets/images/
    - assets/images/user/
    - assets/images/banner/
    - assets/images/on_boarding_images/
    - assets\icons\categories/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-ThinItalic.ttf
          weight: 100
          style: italic
        - asset: assets/fonts/Poppins-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Poppins-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Poppins-ExtraBoldItalic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 900
        - asset: assets/fonts/Poppins-BlackItalic.ttf
          weight: 900
          style: italic
